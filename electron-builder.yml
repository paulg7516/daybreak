# electron-builder.yml
appId: com.paulgerios.daybreak
productName: Daybreak
directories:
  output: release
files:
  # ship only the app - not the dev preview builds (dist/preview, dist/spreview)
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [universal]
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
